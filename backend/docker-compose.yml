services:
  # ---- Ứng dụng Laravel (PHP-FPM) ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edugroup_app
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./storage:/var/www/html/storage          # giữ tệp upload, log qua các lần restart
    networks:
      - edugroup

  # ---- Web server (Nginx) ----
  web:
    image: nginx:alpine
    container_name: edugroup_web
    restart: unless-stopped
    ports:
      - "8080:80"                                 # truy cập: http://localhost:8080
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
    depends_on:
      - app
    networks:
      - edugroup

  # ---- Cơ sở dữ liệu (MySQL) ----
  db:
    image: mysql:8.0
    container_name: edugroup_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-backend1}
      # App đăng nhập bằng user root (theo .env: DB_USERNAME=root).
      # Không khai báo MYSQL_USER=root vì MySQL đã có sẵn user root.
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
    ports:
      - "3307:3306"                               # tránh đụng MySQL local (3306)
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - edugroup

volumes:
  dbdata:

networks:
  edugroup:
    driver: bridge
